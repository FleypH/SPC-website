<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SPC OG Image Template — 1200×630</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #888;
        font-family: Montserrat, system-ui, sans-serif;
        padding: 2rem;
      }

      .note {
        position: fixed;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        padding: 0.75rem 1rem;
        font-size: 13px;
        line-height: 1.5;
        color: #333;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      }

      #og-canvas {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #faf9f6;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.25);
      }

      .accent {
        height: 3px;
        background: linear-gradient(90deg, #006c49 0%, #0a9a6a 100%);
        flex-shrink: 0;
      }

      .layout {
        flex: 1;
        display: grid;
        grid-template-columns: 380px 1fr;
      }

      .logo-panel {
        background: linear-gradient(160deg, #e8f4f0 0%, #d8ece4 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        border-right: 1px solid rgba(0, 108, 73, 0.12);
      }

      .logo-panel img {
        width: auto;
        height: 120px;
        max-width: 260px;
        object-fit: contain;
      }

      .copy-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 3rem 3.5rem;
        gap: 0.75rem;
      }

      .headline {
        font-size: 52px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.05;
        color: #0b1c30;
        max-width: 720px;
      }

      .subtitle {
        font-size: 30px;
        font-weight: 600;
        line-height: 1.25;
        color: #006c49;
        max-width: 680px;
      }

      .rule {
        width: 72px;
        height: 3px;
        background: #006c49;
        margin: 0.35rem 0 0.15rem;
      }

      .tagline {
        font-size: 21px;
        font-weight: 400;
        line-height: 1.45;
        color: #555555;
        max-width: 640px;
      }
    </style>
  </head>
  <body>
    <p class="note">
      Export <strong>#og-canvas</strong> at exactly <strong>1200×630 px</strong> → save as
      <code>og-image.png</code>. See <code>SOCIAL-PREVIEW-SPEC.md</code>.
    </p>

    <div id="og-canvas" aria-label="Shield Point Capital social preview">
      <div class="accent"></div>
      <div class="layout">
        <div class="logo-panel">
          <img src="../main/spclogo.png" alt="" />
        </div>
        <div class="copy-panel">
          <h1 class="headline">SHIELD POINT<br />CAPITAL</h1>
          <div class="rule"></div>
          <p class="subtitle">FinEra Inclusive Credit Marketplace</p>
          <p class="tagline">Building Financial Access for Everyone</p>
        </div>
      </div>
    </div>
  </body>
</html>
